---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  labels:
    team: platform
    managed-by: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/oceans2001/cilium-k8s-platform.git
    targetRevision: HEAD
    path: platform/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
