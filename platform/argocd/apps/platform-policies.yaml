apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-policies
  namespace: argocd
  labels:
    team: platform
    managed-by: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/oceans2001/cilium-k8s-platform.git
    targetRevision: HEAD
    path: networking/policies
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - ServerSideApply=true
