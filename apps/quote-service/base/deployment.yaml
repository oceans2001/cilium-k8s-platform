apiVersion: apps/v1
kind: Deployment
metadata:
  name: quote-service
  namespace: quote-app
  labels:
    app: quote-service
    team: app-team
    env: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quote-service
  template:
    metadata:
      labels:
        app: quote-service
        team: app-team
        env: production
    spec:
      containers:
      - name: quote-service
        image: ghcr.io/oceans2001/quote-service:latest
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
