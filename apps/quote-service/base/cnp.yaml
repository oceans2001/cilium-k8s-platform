---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: quote-service-policy
  namespace: quote-app
  labels:
    team: app-team
    env: production
spec:
  endpointSelector:
    matchLabels:
      app: quote-service
  ingress:
    # allow only traffic proxied through the Cilium Gateway (north-south L7 proxy),
    # restricted at L7 to only the routes this service actually exposes
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
          rules:
            http:
              - method: GET
                path: /quote
              - method: GET
                path: /health
  egress:
    # quote-service has no external dependencies; only allow DNS resolution
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
