---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: quote-service-policy
  namespace: quote-app
  labels:
    team: app-team
    env: production
spec:
  endpointSelector:
    matchLabels:
      app: quote-service
  ingress:
    # allow only from Cilium Gateway (Envoy pods in kube-system)
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
