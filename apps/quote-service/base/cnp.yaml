---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: quote-service-policy
  namespace: quote-app
  labels:
    team: app-team
    env: production
spec:
  endpointSelector:
    matchLabels:
      app: quote-service
  ingress:
    # allow traffic from Cilium Gateway (Envoy proxy in kube-system)
    - fromEntities:
        - ingress
    # allow traffic from within the cluster (Gateway API uses cluster-internal routing)
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
          rules:
            http:
              - method: GET
                path: /quote
              - method: GET
                path: /health
