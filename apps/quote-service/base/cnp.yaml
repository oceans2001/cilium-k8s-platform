---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: quote-service-policy
  namespace: quote-app
  labels:
    team: app-team
    env: production
spec:
  endpointSelector:
    matchLabels:
      app: quote-service
  ingress:
    - fromEntities:
        - ingress
        - cluster
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
