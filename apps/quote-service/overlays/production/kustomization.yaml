---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
images:
  - name: ghcr.io/oceans2001/quote-service
    newTag: "1.0.0"
patches:
  - target:
      kind: Deployment
      name: quote-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
