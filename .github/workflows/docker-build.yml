---
name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - "app-source/**"  # only trigger when app code changes
  pull_request:
    branches: [main]
    paths:
      - "app-source/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/quote-service

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # needed to push to GHCR

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # automatic, no setup needed!

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-        # tag with git commit sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: app-source/quote-service
          push: ${{ github.event_name != 'pull_request' }}  # push only on main
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
