---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: default-deny
  labels:
    team: platform
    env: production
spec:
  description: "Default deny for all pods except quote-app (fully zero-trust via its own CNP)"
  endpointSelector:
    matchExpressions:
      - key: any:io.kubernetes.pod.namespace
        operator: NotIn
        values:
          - quote-app
  ingress:
    - fromEntities:
        - cluster
  egress:
    - toEntities:
        - cluster
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-gateway-ingress
  namespace: kube-system
  labels:
    team: platform
    env: production
spec:
  description: "Allow external traffic into Cilium Gateway Envoy pods only"
  endpointSelector:
    matchLabels:
      k8s-app: cilium-envoy
  ingress:
    - fromEntities:
        - world
        - cluster
