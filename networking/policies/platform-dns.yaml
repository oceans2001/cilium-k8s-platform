---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: platform-dns-visibility
  labels:
    team: platform
    env: production
spec:
  description: "Allow DNS egress to CoreDNS with L7 visibility"
  endpointSelector:
    matchExpressions:
      - key: any:io.kubernetes.pod.namespace
        operator: NotIn
        values:
          - kube-system
  egress:
    - toEndpoints:
        - matchLabels:
            any:io.kubernetes.pod.namespace: kube-system
            any:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
